<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="הוסטל אביבים"/>
<meta name="theme-color" content="#1a1a2e"/>
<link rel="manifest" href="./manifest.webmanifest"/>
<link rel="apple-touch-icon" href="./icons/icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&family=Rubik:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<title>הוסטל אביבים — עוזר חכם</title>
<style>
  :root {
    --bg: #0d0d1a;
    --surface: #16162a;
    --surface2: #1e1e35;
    --border: rgba(255,255,255,0.08);
    --accent: #6c63ff;
    --accent2: #ff6584;
    --accent3: #43e97b;
    --text: #f0f0f8;
    --text2: #9090b8;
    --text3: #5a5a8a;
    --radius: 16px;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Heebo', 'Rubik', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overflow-x: hidden;
  }

  /* Background mesh */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(108,99,255,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 80% 80%, rgba(67,233,123,0.08) 0%, transparent 50%),
      radial-gradient(ellipse 50% 50% at 50% 50%, rgba(255,101,132,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  #app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 0 80px; }

  /* HEADER */
  header {
    padding: 54px 20px 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .logo-block h1 {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -0.5px;
    line-height: 1.2;
  }
  .logo-block h1 span { color: var(--accent); }
  .logo-block p {
    font-size: 12px;
    color: var(--text2);
    margin-top: 3px;
    font-weight: 300;
  }

  /* Language toggle */
  .lang-toggle {
    display: flex;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px;
    gap: 2px;
    flex-shrink: 0;
  }
  .lang-btn {
    border: none;
    background: transparent;
    color: var(--text2);
    font-size: 12px;
    font-weight: 600;
    padding: 5px 10px;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .lang-btn.active {
    background: var(--accent);
    color: #fff;
  }

  /* CHAT AREA */
  #chat {
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 200px;
  }

  .bubble {
    max-width: 88%;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 15px;
    line-height: 1.6;
    animation: bubbleIn 0.3s ease;
  }

  @keyframes bubbleIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .bubble.bot {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-right-radius: 4px;
    align-self: flex-start;
  }
  html[dir="ltr"] .bubble.bot { border-bottom-right-radius: var(--radius); border-bottom-left-radius: 4px; }

  .bubble.user {
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    align-self: flex-end;
    border-bottom-left-radius: 4px;
  }
  html[dir="ltr"] .bubble.user { border-bottom-left-radius: var(--radius); border-bottom-right-radius: 4px; }

  .bubble.bot .meta {
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 4px;
    padding: 14px 18px;
    align-items: center;
  }
  .typing span {
    width: 7px; height: 7px;
    background: var(--text3);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* QUICK CHIPS */
  #chips {
    padding: 12px 16px 0;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    font-size: 13px;
    padding: 7px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .chip:active, .chip:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* INPUT BAR */
  #input-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 100;
    background: linear-gradient(to top, var(--bg) 60%, transparent);
    padding: 12px 16px 20px;
    padding-bottom: max(20px, env(safe-area-inset-bottom));
    max-width: 480px;
    margin: 0 auto;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 8px 8px 8px 16px;
    transition: border-color 0.2s;
  }
  .input-row:focus-within {
    border-color: var(--accent);
  }
  html[dir="ltr"] .input-row { padding: 8px 16px 8px 8px; }

  #q {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    resize: none;
    max-height: 100px;
    min-height: 24px;
    line-height: 1.5;
  }
  #q::placeholder { color: var(--text3); }

  #send-btn {
    width: 40px; height: 40px;
    background: var(--accent);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, background 0.2s;
  }
  #send-btn:active { transform: scale(0.92); }
  #send-btn svg { width: 18px; height: 18px; fill: #fff; }

  /* Divider */
  .divider {
    text-align: center;
    font-size: 11px;
    color: var(--text3);
    padding: 8px 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

  /* RTL/LTR adjustments */
  html[dir="ltr"] body { font-family: 'Rubik', 'Heebo', sans-serif; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo-block">
      <h1 id="title-he">הוסטל <span>אביבים</span></h1>
      <p id="subtitle-text">עוזר חכם • מידע על כללי הוסטל</p>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('he')" id="btn-he">עב</button>
      <button class="lang-btn" onclick="setLang('ru')" id="btn-ru">РУ</button>
    </div>
  </header>

  <div id="chat"></div>

  <div id="chips"></div>
</div>

<div id="input-bar">
  <div class="input-row">
    <textarea id="q" rows="1" placeholder="שאל שאלה..." maxlength="300"></textarea>
    <button id="send-btn" onclick="sendQuestion()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
      </svg>
    </button>
  </div>
</div>

<script>

const RULES_TEXT = `
=== כללי התנהגות בהוסטל ===

הלבשה והנעלה:
- אין ללכת בכפכפים או בנעליים במהלך היום/לילה בהוסטל, למעט יציאה מהחדר למקלחת ובחזרה.

- אין להגיע לקבוצות עם טלפון חוץ מהמתאם. הטלפון צריך להיות על מצב שקט.

כללים נוספים:
- יש לדווח למדריך על כל יציאה מהוסטל וחזרה.
- כביסות ניתן לעשות מהשעה 17:00 בערב.
- אין ללכבס וליבש מכניסת השבת עד צאת השבת.
- לא נכנסים בדברי המדריך. מקשיבים עד הסוף ומפנימים.

=== כללי הוסטל (מספריים) ===

איסורים מוחלטים — הפרה = הרחקה מהוסטל:
1. חל איסור מוחלט על שימוש או החזקת אלכוהול, סמים או תרופות ללא מרשם רופא.
2. חל איסור מוחלט על משחקי קלפים ו/או הימורים מכל סוג.
3. חל איסור מוחלט על אלימות מכל סוג — פיזית, מנטאלית, או מילולית.
4. חל איסור מוחלט על קיום יחסי מין בכל צורה שהיא, בין הדיירים, בין בשטח הוסטל או מחוצה לו.
הפרה אחת מהכללים האלה = הרחקה מיידית מהוסטל.

חובות אישיות:
5. חובתך כדייר להקפיד על היגיינה אישית וסביבתית (תספורת, גילוח, כביסה, ניקיון אישי).
6. יש להסתובב בלבוש הולם ומכבד את מסגרת הוסטל.
7. אין להיכנס לחדר שלך או לפתוח ארון שאינו שלך ללא נוכחות בעליו.
8. אין לשתות בירה שחורה, או משקה מהריץ מכל סוג (רד-בול, BLU, XL וכדו') למעט קפה ותה.
9. אסור לעשן בחדרים או בכל מבנה בשטח הוסטל. העישון מותר בחצר בלבד.
10. אין לאכול או להחזיק אוכל בחדרים ללא אישור צוות.
11. אין להזמין או להכניס אורחים לוסטל ללא אישור צוות.
12. חובה לשלם לקופת הדיירים 100 ₪ בחודש עד ה-12 מדי חודש.
13. יש לבצע את כל תורנויות הניקיון והבית מידי יום. ניצול הפנאי רק לאחר כל הביצועים.
14. אסור לדבר בטלפון נייד בשטח הקהילה. הדיבור מותר רק בחדרים ובמועדון הוסטל וברחבה שלו.
15. אין לבוא במגע עם דיירי הקהילה למתאם.
16. אין לקיים יחסי סחר/חליפין עם דיירי הקהילה (כולל השאלה ונתינה ללא תמורה של חפצים).
17. א. אין להלוות או להעניק כספים בין הדיירים. ב. אין להשאיל או לרכוש מוצר עבור דייר אחר, למעט במקרים שבהם ניתן אישור לכך.
18. קנין הוסטל ירכז וינהל את ההוצאות הכלכליות המשותפות של דיירי הוסטל.
19. חובה להשתתף בכל הפעילויות שבתוכנית הטיפולית.

=== כללים בנוגע לעבודה מחוץ לוסטל ===

21. חובה להימצא במסגרת התעסוקתית במהלך שעות היום.
22. חובה לחזור כל יום לוסטל לא יאוחר משעה 18:00. בימי קבוצות החזרה היא עד שעה 17:00.
23. אין לעבוד בלילה.
24. כל שינוי במקום העבודה מחייב הודעה מוקדמת על ידי הדייר ואישור צוות הוסטל.
25. על כל היעדרות ממקום העבודה וכן יציאה מוקדמת או מאוחרת — חובה לדווח למדריך.
26. יש לדרוש מהמעסיק תלוש שכר.
27. כל בקשה למקדמה מהמעסיק מחייבת אישור צוות.
28. במידה והדייר לא עובד במהלך השבוע (מכל סיבה, לרבות מחלה) — יציאתו לביקור בית תישקל ע"י הצוות.

=== כללי יציאה מהוסטל ===

29. חובה לבקש אישור צוות לפני כל יציאה מהוסטל.
30. היציאה מהוסטל באמצע השבוע היא עד שעה 23:00.
31. יציאה לביקור לצורך שינה מחוץ להוסטל תיעשה רק באישור צוות הוסטל.
32. יש להכין תוכנית שבועית, הכוללת יציאות מתוכננות, והגשה עד יום ב' בבוקר.
33. ביקורי בית אפשריים מיום חמישי לאחר יום עבודה (במידה והדייר אינו עובד ביום שישי). חזרה מביקורי בית במוצאי שבת עד שעה 22:30.
34. במידה והדייר לא נמצא במסגרת תעסוקתית מכל סיבה, אין ביקורי בית, למעט מקרים חריגים שהצוות יאשר.
35. לא ניתן לצאת לביקור בית בחודש הראשון להגעת הדייר. בכל מקרה האפשרות לביקור בית היא שיקול דעתו של הצוות.
36. ביקורי בית ויציאות יתאפשרו בהתאם לנהלים הנוהגים בכל שלב.
37. במהלך חודש שלם, ניתן לצאת עד שלוש שבתות ברצף. שבת רביעית (וחמישית) סגורה לכלל הדיירים.
38. חובה ללון בוסטל מינימום 5 לילות בשבוע.
39. בעת החזרה להוסטל יש לידע את איש הצוות הנמצא במקום, ולעבור בדיקת אלכוהול ובדיקת שתן כנדרש.
40. חל איסור מוחלט על קיום יחסי מין עם נערת ליווי/מכון ליווי.

=== תוכנית טיפול — 4 שלבים ===

שלב הסתגלות (קליטה 2 חודשים):
- ביקורי בית: ביקור ראשון אחרי חודש קלנדרי מלא. ימי ביקור: שישי-שבת.
- יציאות: חודש ראשון — יציאה אחת בשבוע לצורך קניות/התאווררות/סידורים כולל שישי-שבת, בליווי דייר ותיק. חודש שני — ניתן לבקש 2 יציאות כולל שישי-שבת לשיקול הצוות.

שלב מתחילים (2–6 חודשים):
- ביקורי בית: 2–4 חודשים: עד 2 ביקורים בחודש. 4–6 חודשים: ניתן לבקש עד 3 ביקורים בחודש.
- יציאות: 2–3 חודשים: 2 יציאות+1 שישי/שבת. 3–6 חודשים: ניתן לבקש 3 יציאות+1.

שלב בוגרים (6–10 חודשים):
- ביקורי בית: עד 3 ביקורים בחודש, חמישי-מוצש.
- יציאות: 3 יציאות בשבוע+1 שישי/שבת.

שלב סיום ופרידה (10–12 חודשים):
- ביקורי בית: עד 3 ביקורים בחודש, חמישי-מוצש.
- יציאות: 3 יציאות בשבוע+1 שישי/שבת.
- קבוצת פרידה מהוסטל.

    thinking: 'חושב...',
    error: 'שגיאה. נסה שוב.',
    systemPrompt: `אתה עוזר חכם של הוסטל אביבים — הוסטל טיפולי של עמותת "בית אור אביבה". 
ענה בעברית בלבד. תן תשובות קצרות, ברורות ומדויקות בהתבסס על כללי הוסטל.
אם השאלה לא קשורה לכללי הוסטל, אמור שאתה יכול לענות רק על שאלות הקשורות לכללי הוסטל.
הכללים:
${RULES_TEXT}`
  },
  ru: {
    dir: 'ltr',
    placeholder: 'Задай вопрос о правилах хостела...',
    subtitle: 'Умный помощник • Правила хостела Авивим',
    botName: 'Помощник хостела',
    welcome: 'Привет! Я отвечаю на вопросы о правилах хостела Авивим. Спрашивай.',
    chips: ['Во сколько возврат?', 'Можно в тапках?', 'Домашние визиты', 'Дежурство', 'Выходы из хостела'],
    thinking: 'Думаю...',
    error: 'Ошибка. Попробуй снова.',
    systemPrompt: `Ты умный помощник хостела Авивим — терапевтического хостела ассоциации "Бейт Ор Авива".
Отвечай только на русском языке. Давай короткие, чёткие и точные ответы на основе правил хостела.
Если вопрос не связан с правилами хостела, скажи что можешь отвечать только на вопросы о правилах.
Правила хостела:
${RULES_TEXT}`
  }
};

let currentLang = 'he';
let isLoading = false;

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
function init() {
  setLang('he');
  renderChips();
  addBotMessage(LANG[currentLang].welcome);

  const q = document.getElementById('q');
  q.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendQuestion();
    }
  });
  q.addEventListener('input', () => {
    q.style.height = 'auto';
    q.style.height = Math.min(q.scrollHeight, 100) + 'px';
  });
}

function setLang(lang) {
  currentLang = lang;
  const cfg = LANG[lang];
  document.documentElement.setAttribute('dir', cfg.dir);
  document.documentElement.setAttribute('lang', lang);
  document.getElementById('subtitle-text').textContent = cfg.subtitle;
  document.getElementById('q').placeholder = cfg.placeholder;
  document.getElementById('btn-he').classList.toggle('active', lang === 'he');
  document.getElementById('btn-ru').classList.toggle('active', lang === 'ru');
  renderChips();
}

function renderChips() {
  const chips = LANG[currentLang].chips;
  const el = document.getElementById('chips');
  el.innerHTML = chips.map(c =>
    `<button class="chip" onclick="askChip('${c}')">${c}</button>`
  ).join('');
}

function askChip(text) {
  document.getElementById('q').value = text;
  sendQuestion();
}

// ═══════════════════════════════════════════════
// CHAT
// ═══════════════════════════════════════════════
function addBotMessage(text) {
  const chat = document.getElementById('chat');
  const cfg = LANG[currentLang];
  const div = document.createElement('div');
  div.className = 'bubble bot';
  div.innerHTML = `<div class="meta">${cfg.botName}</div>${escapeHtml(text).replace(/\n/g, '<br>')}`;
  chat.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function addUserMessage(text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'bubble user';
  div.textContent = text;
  chat.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function showTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'bubble bot typing';
  div.id = 'typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function addDivider() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'divider';
  div.textContent = '· · ·';
  chat.appendChild(div);
}

async function sendQuestion() {
  const q = document.getElementById('q');
  const text = q.value.trim();
  if (!text || isLoading) return;

  q.value = '';
  q.style.height = 'auto';
  isLoading = true;

  const chatCount = document.getElementById('chat').children.length;
  if (chatCount > 1) addDivider();

  addUserMessage(text);
  showTyping();

  try {
    const cfg = LANG[currentLang];
    const response = await fetch('https://hostel-proxy.bchenkirov.workers.dev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1000,
        system: cfg.systemPrompt,
        messages: [{ role: 'user', content: text }]
      })
    });

    const data = await response.json();
    hideTyping();

    const answer = data?.content?.[0]?.text || cfg.error;
    addBotMessage(answer);
  } catch (e) {
    hideTyping();
    addBotMessage(LANG[currentLang].error);
  }

  isLoading = false;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

init();
</script>

</html>
